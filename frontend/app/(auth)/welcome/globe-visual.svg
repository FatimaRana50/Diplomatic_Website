<svg viewBox="0 0 600 600" fill="none" xmlns="http://www.w3.org/2000/svg" width="600" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2e4a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </radialGradient>
    <radialGradient id="globeGrad" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </radialGradient>
    <radialGradient id="shine" cx="30%" cy="25%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <clipPath id="clip">
      <circle cx="300" cy="300" r="240"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="url(#bg)"/>

  <!-- Outer atmosphere rings -->
  <circle cx="300" cy="300" r="270" fill="none" stroke="rgba(212,160,23,0.06)" stroke-width="40"/>
  <circle cx="300" cy="300" r="255" fill="none" stroke="rgba(212,160,23,0.1)" stroke-width="2"/>

  <!-- Globe sphere -->
  <circle cx="300" cy="300" r="240" fill="url(#globeGrad)"/>

  <!-- Grid clipped to sphere -->
  <g clip-path="url(#clip)" stroke="rgba(212,160,23,0.2)" stroke-width="0.8">
    <!-- Latitudes -->
    <line x1="60" y1="180" x2="540" y2="180"/>
    <line x1="60" y1="220" x2="540" y2="220"/>
    <line x1="60" y1="260" x2="540" y2="260"/>
    <line x1="60" y1="300" x2="540" y2="300" stroke="rgba(212,160,23,0.4)" stroke-width="1.5"/>
    <line x1="60" y1="340" x2="540" y2="340"/>
    <line x1="60" y1="380" x2="540" y2="380"/>
    <line x1="60" y1="420" x2="540" y2="420"/>
    <!-- Longitudes as ellipses -->
    <ellipse cx="300" cy="300" rx="30" ry="240"/>
    <ellipse cx="300" cy="300" rx="70" ry="240"/>
    <ellipse cx="300" cy="300" rx="120" ry="240"/>
    <ellipse cx="300" cy="300" rx="180" ry="240"/>
    <ellipse cx="300" cy="300" rx="240" ry="240"/>
    <ellipse cx="300" cy="300" rx="195" ry="240"/>
    <ellipse cx="300" cy="300" rx="140" ry="240"/>
    <ellipse cx="300" cy="300" rx="90" ry="240"/>
    <ellipse cx="300" cy="300" rx="45" ry="240"/>
  </g>

  <!-- Continents -->
  <g clip-path="url(#clip)" fill="rgba(212,160,23,0.18)" stroke="rgba(212,160,23,0.45)" stroke-width="1">
    <!-- Europe/Africa blob -->
    <path d="M280 175 Q300 162 322 170 Q348 180 342 205 Q355 228 345 255 Q335 285 328 318 Q316 355 305 375 Q290 360 275 332 Q258 300 260 268 Q255 235 268 208 Z"/>
    <!-- Americas blob -->
    <path d="M108 185 Q128 170 148 183 Q168 200 162 228 Q154 260 142 290 Q128 325 112 345 Q96 365 84 345 Q70 322 74 292 Q76 255 88 225 Z"/>
    <!-- Asia blob -->
    <path d="M368 158 Q408 148 445 162 Q478 178 474 210 Q468 242 448 260 Q420 278 390 265 Q362 250 360 218 Q358 182 368 158 Z"/>
    <!-- Oceania -->
    <path d="M418 352 Q445 338 462 354 Q476 370 468 390 Q455 408 433 402 Q412 394 414 374 Z"/>
    <!-- North America east -->
    <path d="M160 148 Q185 138 205 155 Q220 175 210 198 Q195 215 172 210 Q150 202 148 180 Z"/>
  </g>

  <!-- Shine overlay -->
  <circle cx="300" cy="300" r="240" fill="url(#shine)"/>

  <!-- Capital dot markers with glow -->
  <g filter="url(#glow)">
    <circle cx="300" cy="210" r="6" fill="rgba(212,160,23,0.95)"/>
    <circle cx="300" cy="210" r="12" fill="rgba(212,160,23,0.2)"/>

    <circle cx="185" cy="240" r="5" fill="rgba(212,160,23,0.9)"/>
    <circle cx="185" cy="240" r="10" fill="rgba(212,160,23,0.2)"/>

    <circle cx="415" cy="220" r="5" fill="rgba(212,160,23,0.9)"/>
    <circle cx="415" cy="220" r="10" fill="rgba(212,160,23,0.2)"/>

    <circle cx="138" cy="188" r="4" fill="rgba(212,160,23,0.8)"/>
    <circle cx="138" cy="188" r="8" fill="rgba(212,160,23,0.18)"/>

    <circle cx="445" cy="368" r="4" fill="rgba(212,160,23,0.8)"/>
    <circle cx="445" cy="368" r="8" fill="rgba(212,160,23,0.18)"/>

    <circle cx="312" cy="340" r="4" fill="rgba(212,160,23,0.8)"/>
  </g>

  <!-- Connection arcs between capitals -->
  <g stroke="rgba(212,160,23,0.3)" stroke-width="1" fill="none" stroke-dasharray="4 4">
    <path d="M300 210 Q350 180 415 220"/>
    <path d="M185 240 Q240 200 300 210"/>
    <path d="M300 210 Q300 280 312 340"/>
  </g>

  <!-- Outer ring -->
  <circle cx="300" cy="300" r="240" stroke="rgba(212,160,23,0.35)" stroke-width="2" fill="none"/>

  <!-- Corner decorative elements -->
  <line x1="30" y1="30" x2="80" y2="30" stroke="rgba(212,160,23,0.4)" stroke-width="1.5"/>
  <line x1="30" y1="30" x2="30" y2="80" stroke="rgba(212,160,23,0.4)" stroke-width="1.5"/>
  <line x1="570" y1="30" x2="520" y2="30" stroke="rgba(212,160,23,0.4)" stroke-width="1.5"/>
  <line x1="570" y1="30" x2="570" y2="80" stroke="rgba(212,160,23,0.4)" stroke-width="1.5"/>
  <line x1="30" y1="570" x2="80" y2="570" stroke="rgba(212,160,23,0.4)" stroke-width="1.5"/>
  <line x1="30" y1="570" x2="30" y2="520" stroke="rgba(212,160,23,0.4)" stroke-width="1.5"/>
  <line x1="570" y1="570" x2="520" y2="570" stroke="rgba(212,160,23,0.4)" stroke-width="1.5"/>
  <line x1="570" y1="570" x2="570" y2="520" stroke="rgba(212,160,23,0.4)" stroke-width="1.5"/>

  <!-- Label text -->
  <text x="300" y="568" text-anchor="middle" fill="rgba(212,160,23,0.5)" font-size="11" font-family="monospace" letter-spacing="3">180+ COUNTRIES SERVED</text>
</svg>
