<svg viewBox="0 0 480 560" fill="none" xmlns="http://www.w3.org/2000/svg" width="480" height="560">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="rgba(13,27,42,0.45)"/>
    </filter>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1a3150"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(212,160,23,0)"/>
      <stop offset="20%" stop-color="rgba(212,160,23,0.8)"/>
      <stop offset="80%" stop-color="rgba(212,160,23,0.8)"/>
      <stop offset="100%" stop-color="rgba(212,160,23,0)"/>
    </linearGradient>
  </defs>

  <!-- Background subtle texture -->
  <rect width="480" height="560" fill="#f5f2eb"/>
  <rect width="480" height="560" fill="rgba(13,27,42,0.03)"/>

  <!-- Document card with shadow -->
  <rect x="40" y="30" width="400" height="500" rx="12" fill="white" filter="url(#shadow)"/>
  <rect x="40" y="30" width="400" height="500" rx="12" fill="white" stroke="rgba(200,191,168,0.6)" stroke-width="1"/>

  <!-- Navy header -->
  <rect x="40" y="30" width="400" height="88" rx="12" fill="url(#headerGrad)"/>
  <rect x="40" y="90" width="400" height="28" fill="#0d1b2a"/>

  <!-- Gold emblem circle -->
  <circle cx="240" cy="62" r="22" fill="rgba(212,160,23,0.15)" stroke="rgba(212,160,23,0.5)" stroke-width="1.5"/>
  <polygon points="240,44 243,55 254,55 246,62 249,73 240,66 231,73 234,62 226,55 237,55" fill="rgba(212,160,23,0.9)"/>

  <!-- Gold divider line full width -->
  <line x1="40" y1="118" x2="440" y2="118" stroke="url(#goldLine)" stroke-width="1.5"/>

  <!-- Header text lines -->
  <rect x="170" y="100" width="140" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
  <rect x="190" y="94" width="100" height="4" rx="2" fill="rgba(212,160,23,0.35)"/>

  <!-- Document title -->
  <rect x="130" y="132" width="220" height="10" rx="5" fill="#0d1b2a" opacity="0.8"/>
  <rect x="155" y="148" width="170" height="6" rx="3" fill="rgba(13,27,42,0.15)"/>

  <!-- Gold thin divider under title -->
  <line x1="60" y1="162" x2="420" y2="162" stroke="rgba(212,160,23,0.3)" stroke-width="0.8"/>

  <!-- Salutation block -->
  <rect x="60" y="174" width="250" height="7" rx="3.5" fill="rgba(13,27,42,0.25)"/>
  <rect x="60" y="186" width="180" height="6" rx="3" fill="rgba(13,27,42,0.12)"/>

  <!-- Body text paragraph lines -->
  <rect x="60" y="206" width="360" height="5.5" rx="2.75" fill="rgba(200,191,168,0.8)"/>
  <rect x="60" y="216" width="350" height="5.5" rx="2.75" fill="rgba(200,191,168,0.8)"/>
  <rect x="60" y="226" width="340" height="5.5" rx="2.75" fill="rgba(200,191,168,0.8)"/>
  <rect x="60" y="236" width="320" height="5.5" rx="2.75" fill="rgba(200,191,168,0.7)"/>
  <rect x="60" y="246" width="360" height="5.5" rx="2.75" fill="rgba(200,191,168,0.8)"/>
  <rect x="60" y="256" width="280" height="5.5" rx="2.75" fill="rgba(200,191,168,0.7)"/>

  <!-- Second paragraph -->
  <rect x="60" y="272" width="360" height="5.5" rx="2.75" fill="rgba(200,191,168,0.8)"/>
  <rect x="60" y="282" width="355" height="5.5" rx="2.75" fill="rgba(200,191,168,0.8)"/>
  <rect x="60" y="292" width="330" height="5.5" rx="2.75" fill="rgba(200,191,168,0.7)"/>
  <rect x="60" y="302" width="150" height="5.5" rx="2.75" fill="rgba(200,191,168,0.6)"/>

  <!-- Dashed section divider -->
  <line x1="60" y1="320" x2="420" y2="320" stroke="rgba(200,191,168,0.6)" stroke-width="1" stroke-dasharray="6 5"/>

  <!-- Placeholder tags -->
  <rect x="60" y="332" width="160" height="26" rx="5" fill="rgba(212,160,23,0.1)" stroke="rgba(212,160,23,0.35)" stroke-width="1"/>
  <text x="76" y="349" fill="rgba(212,160,23,0.8)" font-size="10" font-family="monospace" font-weight="600">[RECIPIENT NAME]</text>

  <rect x="60" y="365" width="140" height="26" rx="5" fill="rgba(212,160,23,0.1)" stroke="rgba(212,160,23,0.35)" stroke-width="1"/>
  <text x="76" y="382" fill="rgba(212,160,23,0.8)" font-size="10" font-family="monospace" font-weight="600">[MISSION CODE]</text>

  <rect x="60" y="398" width="170" height="26" rx="5" fill="rgba(212,160,23,0.1)" stroke="rgba(212,160,23,0.35)" stroke-width="1"/>
  <text x="76" y="415" fill="rgba(212,160,23,0.8)" font-size="10" font-family="monospace" font-weight="600">[CLASSIFIED INFO]</text>

  <!-- Closing lines -->
  <rect x="60" y="436" width="280" height="5.5" rx="2.75" fill="rgba(200,191,168,0.6)"/>
  <rect x="60" y="447" width="200" height="5.5" rx="2.75" fill="rgba(200,191,168,0.5)"/>

  <!-- Signature line -->
  <line x1="260" y1="488" x2="420" y2="488" stroke="rgba(200,191,168,0.8)" stroke-width="1"/>
  <rect x="290" y="494" width="100" height="5" rx="2.5" fill="rgba(200,191,168,0.5)"/>

  <!-- Wax seal -->
  <circle cx="100" cy="488" r="28" fill="rgba(150,25,25,0.88)"/>
  <circle cx="100" cy="488" r="22" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <polygon points="100,474 103,482 111,482 105,487 107,496 100,491 93,496 95,487 89,482 97,482" fill="rgba(255,255,255,0.4)"/>

  <!-- Gold bottom border line -->
  <line x1="40" y1="528" x2="440" y2="528" stroke="url(#goldLine)" stroke-width="1"/>

  <!-- Footer text label -->
  <text x="240" y="548" text-anchor="middle" fill="rgba(212,160,23,0.5)" font-size="9" font-family="monospace" letter-spacing="2.5">CONFIDENTIAL MODE ACTIVE</text>
</svg>
